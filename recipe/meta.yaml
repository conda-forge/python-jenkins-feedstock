{% set name = "python-jenkins" %}
{% set version = "1.8.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 8f4761c391ac11e8c1f23f771010920c10440497705ab7175d52358f5a12dc98

build:
  noarch: python
  number: 0
  script: '{{ PYTHON }} -m pip install . --no-deps --ignore-installed --no-cache-dir -vvv '

requirements:
  host:
    - pbr >=0.8.2
    - pip
    - python {{ python_min }}
  run:
    - multi_key_dict
    - python >={{ python_min }}
    - requests
    - setuptools
    - pbr >=0.8.2  # in upstream requirements.txt; needed by pip check
    - six >=1.3.0

test:
  imports:
    - jenkins
  requires:
    - pip
    - python {{ python_min }}
  commands:
    - pip check

about:
  home: http://git.openstack.org/cgit/openstack/python-jenkins
  license: BSD-3-Clause
  license_family: BSD
  license_file: COPYING
  summary: Python Jenkins is a python wrapper for the Jenkins REST API

extra:
  recipe-maintainers:
    - nicoddemus
